services:
  postgres:
    image: postgres:16-alpine
    container_name: logscale-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logscale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logscale_secret}
      POSTGRES_DB: ${POSTGRES_DB:-logscale_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-logscale} -d ${POSTGRES_DB:-logscale_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: logscale-redis
    restart: always
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
